
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdf2f8; margin: 0; padding: 20px; }
  h2 { color: #d63384; margin-bottom: 10px; text-align: center; }
  
  /* Changed to 3x3 size */
  #puzzle-container { 
    width: 300px; height: 300px; 
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; 
    background: #333; border: 8px solid #d63384; border-radius: 10px; 
    box-shadow: 0 8px 20px rgba(0,0,0,0.3); 
  }
  
  .tile { 
    width: 100%; height: 100%; background-size: 300px 300px; 
    cursor: pointer; border: none; border-radius: 4px; 
    position: relative; transition: transform 0.1s; 
    display: flex; justify-content: center; align-items: center;
    color: white; font-weight: bold; font-size: 24px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.9), 0 0 10px rgba(0,0,0,0.8);
  }
  .tile:active { transform: scale(0.95); }
  .empty { background: #2a2a2a; cursor: default; text-shadow: none; }
  
  #message { margin-top: 20px; font-size: 22px; color: #d63384; font-weight: bold; min-height: 30px; text-align: center; }
  .btn-container { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; justify-content: center; }
  .btn { padding: 12px 30px; font-size: 16px; cursor: pointer; border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: white; }
  #shuffle-btn { background: #d63384; }
  #shuffle-btn:hover { background: #b82b6e; }
  #solve-btn { background: #7c3aed; }
  #solve-btn:hover { background: #5b21b6; }
  
  @media (max-width: 400px) { 
    #puzzle-container { width: 260px; height: 260px; } 
    .tile { background-size: 260px 260px; font-size: 20px; } 
  }
</style>
</head>
<body>

<h2>❤️ Happy Monthsary, My Adi! ❤️</h2>
<div id="puzzle-container"></div>
<div id="message"></div>
<div class="btn-container">
  <button id="shuffle-btn" class="btn">🔄 Shuffle</button>
  <button id="solve-btn" class="btn">✨ Show Solved</button>
</div>

<script>
 
  // --- YOUR IMAGE LINK IS HERE (I replaced it with a working test photo) ---
  const imageUrl = "https://raw.githubusercontent.com/raizenxd/puzzleforadi/refs/heads/main/image.png"; 

  const container = document.getElementById('puzzle-container');
  const message = document.getElementById('message');
  let tiles = [];
  let emptyIndex = 8; // 3x3 grid has 9 spots (0 to 8). Empty is at 8.
  const gridSize = 3;
  const tileSize = 300 / gridSize; // 100px per tile for a 300px container

  function initPuzzle() {
    tiles = Array.from({ length: 9 }, (_, i) => i); // 0 to 8
    shuffleArray(tiles);
    // Ensure the empty tile is at the bottom right (index 8) to be solvable
    if (tiles[8] !== 8) {
      const idx = tiles.indexOf(8);
      [tiles[idx], tiles[8]] = [tiles[8], tiles[idx]];
    }
    emptyIndex = 8;
    renderPuzzle();
    message.innerText = "";
  }

  function solvePuzzle() {
    tiles = Array.from({ length: 9 }, (_, i) => i);
    emptyIndex = 8;
    renderPuzzle();
    message.innerText = "🎉 Here is the completed picture! 🎉";
  }

  function renderPuzzle() {
    container.innerHTML = '';
    tiles.forEach((num, index) => {
      const div = document.createElement('div');
      div.className = 'tile';
      if (num === 8) { // The 9th piece is the empty space
        div.classList.add('empty');
      } else {
        // Add the number guide (1 to 8)
        div.innerText = num + 1;
        
        const row = Math.floor(num / gridSize);
        const col = num % gridSize;
        div.style.backgroundImage = `url(${imageUrl})`;
        div.style.backgroundPosition = `-${col * tileSize}px -${row * tileSize}px`;
        div.onclick = () => moveTile(index);
      }
      container.appendChild(div);
    });
  }

  function moveTile(index) {
    const row = Math.floor(index / gridSize);
    const col = index % gridSize;
    const emptyRow = Math.floor(emptyIndex / gridSize);
    const emptyCol = emptyIndex % gridSize;
    // Check if tile is adjacent to the empty slot (Manhattan distance of 1)
    if ((Math.abs(row - emptyRow) + Math.abs(col - emptyCol)) === 1) {
      [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
      emptyIndex = index;
      renderPuzzle();
      checkWin();
    }
  }

  function checkWin() {
    if (tiles.every((val, idx) => val === idx)) {
      message.innerText = "🎉 You did it! I love you, Adi! 🎉";
    }
  }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }

  // Button Listeners
  document.getElementById('shuffle-btn').onclick = initPuzzle;
  document.getElementById('solve-btn').onclick = solvePuzzle;
  
  // Start the game
  initPuzzle();
</script>
</body>
</html>
